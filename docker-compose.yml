version: "3.9"

services:
  automation:
    build: .
    env_file: .env
    ports:
      - "8080:8000"
    depends_on:
      - db
    volumes:
      - ./automation:/app/automation
      - ./automation.log:/app/automation.log
    restart: unless-stopped

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: devin_automation
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  db_data:
